<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embed Lite | Render URL Embeds On-The-Fly</title>
    <meta name="description" content="A zero-dependency JavaScript package that statically renders iframe embeds and blockquotes on the fly for 20+ services like Youtube, Twitter, and Spotify—with zero oEmbed API calls.">
    <meta name="keywords" content="embed, render, iframe, oembed, zero-dependency, static embed, auto detect link, youtube embed, twitter embed">
    <style>
        :root {
            --bg: #0f172a; --surface: #1e293b; --text: #f8fafc;
            --primary: #3b82f6; --border: #334155;
            --radius-lg: 12px; --radius-sm: 8px;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0; padding: 0; background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container {
            width: 100%; max-width: 800px; padding: 2rem; margin-top: 2rem;
        }
        h1 { text-align: center; margin-bottom: 0.5rem; font-size: 2.5rem; letter-spacing: -0.02em; }
        p.subtitle { text-align: center; color: #94a3b8; font-size: 1.1rem; margin-bottom: 2rem; line-height: 1.5; }
        
        .hero-box {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 2rem; margin-bottom: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        .input-group { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        input {
            flex: 1; padding: 1rem; border-radius: var(--radius-sm); border: 1px solid var(--border);
            background: var(--bg); color: var(--text); font-size: 1rem;
        }
        input:focus { outline: 2px solid var(--primary); outline-offset: -1px; }
        button {
            padding: 1rem 1.5rem; background: var(--primary); color: white; border: none;
            border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        button:hover { background: #2563eb; }
        
        .preview-wrapper {
            margin-top: 1.5rem; padding: 1rem; background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius-sm); min-height: 150px; display: flex; align-items: center; justify-content: center;
        }
        .preview-wrapper iframe {
            width: 100%; aspect-ratio: 16/9; max-width: 100%; border: none; border-radius: 8px;
        }
        code, pre {
            display: block; width: 100%; padding: 1rem; background: #020617; border-radius: var(--radius-sm);
            color: #38bdf8; overflow-x: auto; margin-top: 1rem; font-family: monospace; font-size: 0.9rem;
        }
        .instructions {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2rem;
        }
        .instructions h3 { margin-top: 0; margin-bottom: 1rem; }
        .instructions p { color: #cbd5e1; line-height: 1.6; }
        .instructions code { display: inline; padding: 0.2rem 0.4rem; background: #0f172a; border-radius: 4px; border: 1px solid var(--border);}
        .empty-state { color: #64748b; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>Embed Lite ⚡</h1>
    <p class="subtitle">Auto-detect links and <strong>render</strong> secure <iframe> and HTML blockquotes <strong>on the fly</strong>.<br/>Zero dependencies. No external API calls.</p>

    <div class="hero-box">
        <label for="url-input" style="display:block; margin-bottom: 0.5rem; font-weight: 500;">Enter a URL to generate an embed live:</label>
        <div class="input-group">
            <input type="text" id="url-input" placeholder="e.g. https://www.youtube.com/watch?v=dQw4w9WgXcQ">
            <button id="convert-btn">Embed</button>
        </div>

        <div style="font-size: 0.9rem; font-weight: 600; margin-bottom: 0.5rem; color: #e2e8f0;">Generated Render Code:</div>
        <pre id="code-output" style="min-height: 48px; margin-top:0;"><span class="empty-state">Waiting for URL...</span></pre>

        <div style="font-size: 0.9rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #e2e8f0;">Live Interactive Preview:</div>
        <div class="preview-wrapper" id="preview-output">
            <span class="empty-state">No embed rendered yet.</span>
        </div>
    </div>

    <div class="instructions">
        <h3>Installation & Usage</h3>
        <p>Drop a CDN script directly into your frontend to render embeds dynamically. Available in both uncompressed (<code>.js</code>) and compressed (<code>.min.js</code>) formats for high compatibility.</p>
        <pre style="color: #cbd5e1; background: #0f172a; margin-top: 0;">&lt;script src="https://unpkg.com/embed-lite/dist/embed-lite.global.min.js"&gt;&lt;/script&gt;
&lt;script&gt;
  // Instantly renders the target URL directly into the browser DOM
  const result = window.embedLite.embed("https://youtube...");
  document.getElementById("my-div").innerHTML = result.html;
&lt;/script&gt;</pre>
        
        <p style="margin-top:2rem">Or install securely via NPM for strictly-typed environments and Site Generators:</p>
        <pre style="color: #4ade80; background: #0f172a; margin-top: 0; margin-bottom: 1rem;">npm install embed-lite</pre>
        <pre style="color: #cbd5e1; background: #0f172a; margin-top: 0;">import { embed } from 'embed-lite';
const { html } = embed('https://vimeo.com/...'); </pre>
    </div>
</div>

<!-- Load our internally built CDN format globally! -->
<script src="./embed-lite.global.min.js"></script>
<script>
    const input = document.getElementById('url-input');
    const btn = document.getElementById('convert-btn');
    const preview = document.getElementById('preview-output');
    const code = document.getElementById('code-output');

    function renderEmbed() {
        const url = input.value.trim();
        if (!url) return;

        try {
            // Calling our global CDN object directly!
            const result = window.embedLite.embed(url);
            
            if (result && result.html) {
                code.textContent = result.html;
                preview.innerHTML = result.html;
                
                // Securely execute Twitter/Reddit blockquote scripts if injected
                const scripts = preview.getElementsByTagName('script');
                for (let i = 0; i < scripts.length; i++) {
                    const existing = scripts[i];
                    const newScript = document.createElement('script');
                    newScript.src = existing.src;
                    newScript.async = true;
                    document.body.appendChild(newScript);
                }
            } else {
                code.innerHTML = '<span style="color:#ef4444">Error: Supported auto-detection platform not found.</span>';
                preview.innerHTML = '<span class="empty-state" style="color:#ef4444">Unsupported URL</span>';
            }
        } catch (e) {
            console.error(e);
            code.textContent = "Failed to render.";
        }
    }

    btn.addEventListener('click', renderEmbed);
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') renderEmbed();
    });
</script>
</body>
</html>
